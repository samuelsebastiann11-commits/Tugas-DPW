        .gallery-item {
            width: calc(33.333% - 20px);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
        }

        /* Adjust these values if needed */
        @media (max-width: 768px) {
            .gallery-item {
                width: calc(50% - 10px);
            }
        }

        @media (max-width: 500px) {
            .gallery-item {
                width: 100%;
            }
        }
    </style>
