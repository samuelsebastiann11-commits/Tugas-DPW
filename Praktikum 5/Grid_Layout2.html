<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grid Layout Samuel</title>
    <link rel="icon" href="GAMBAR MODUL/Gambar Logo.png" sizes="16x16">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 30px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .item1 {
            grid-column: 1 / 5;
            background-color: #2196f3;
            color: white;
            padding: 30px;
            font-size: 32px;
            text-align: center;
            border-radius: 10px;
        }

        .item {
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            font-size: 25px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .item5 {
            grid-column: 2 / 5;
        }

        .penjelasan {
            grid-column: 1 / 5;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            font-size: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #333;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    Belajar Grid Layout Samuel
</header>

<div class="grid-container">
    <div class="item1">1</div>

    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>

    <div class="item item5">5</div>

    <div class="item">6</div>
    <div class="item">7</div>
    <div class="item">8</div>

    <div class="penjelasan">
        <b>Penjelasan:</b><br>
        grid-column-start digunakan untuk menentukan posisi awal kolom, 
        sedangkan grid-column-end digunakan untuk menentukan sampai kolom berapa elemen tersebut melebar.
    </div>
</div>

<footer>
    © 2026 Samuel Aldrik Sebastian
</footer>

</body>
</html>
